services:
  postgres:
    image: postgres:16-alpine
    container_name: sg_remesas_postgres
    restart: always
    environment:
      POSTGRES_USER: remesas_user
      POSTGRES_PASSWORD: remesas_password
      POSTGRES_DB: sg_remesas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remesas_user -d sg_remesas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sg_remesas_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://remesas_user:remesas_password@postgres:5432/sg_remesas_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sg_remesas_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
